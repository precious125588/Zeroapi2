<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Zero API — Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#030305;--c1:#0a0a0f;--c2:#111118;--c3:#18181f;--border:#252532;--accent:#8b5cf6;--accent3:#a78bfa;--grad:linear-gradient(135deg,#8b5cf6,#22d3ee);--green:#10b981;--red:#ef4444;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:var(--c1);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:26px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo p{color:var(--text2);font-size:14px;margin-top:6px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field input{width:100%;background:var(--c2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;transition:.15s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(139,92,246,.1)}
.btn{width:100%;background:var(--grad);color:#fff;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:.2s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.msg{padding:12px 14px;border-radius:10px;font-size:14px;margin-top:14px;text-align:center}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:var(--red)}
.msg.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);color:var(--green)}
.link-row{text-align:center;margin-top:20px;font-size:14px;color:var(--text3)}
.link-row a{color:var(--accent3);text-decoration:none}
.link-row a:hover{text-decoration:underline}
.key-result{background:var(--c2);border:1px solid rgba(139,92,246,.3);border-radius:14px;padding:20px;margin-top:20px}
.kv-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:5px}
.kv-val{font-family:monospace;font-size:13px;color:var(--accent3);background:var(--bg);padding:10px 12px;border-radius:8px;word-break:break-all;cursor:pointer;border:1px solid var(--border);transition:.15s}
.kv-val:hover{border-color:var(--accent)}
.kv-block{margin-bottom:12px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>⚡ Zero API</h1>
    <p>Sign in to access your API key</p>
  </div>
  <div id="msg"></div>
  <div id="form-area">
    <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com" autocomplete="email"/></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
  </div>
  <div class="key-result" id="result" style="display:none">
    <div class="kv-block">
      <div class="kv-label">Your API Key (click to copy)</div>
      <div class="kv-val" id="kv-key" onclick="copyEl('kv-key')"></div>
    </div>
    <div class="kv-block">
      <div class="kv-label">Daily Usage</div>
      <div id="kv-usage" style="font-size:13px;color:var(--text2);padding:6px 0"></div>
    </div>
    <div style="margin-top:12px;text-align:center">
      <a href="/" style="color:var(--accent3);font-size:14px;text-decoration:none">→ Go to API Tester</a>
      &nbsp;·&nbsp;
      <a href="/docs" style="color:var(--accent3);font-size:14px;text-decoration:none">→ View Docs</a>
    </div>
  </div>
  <div class="link-row" style="margin-top:16px">Don't have an account? <a href="/register">Register here</a></div>
  <div class="link-row" style="margin-top:8px"><a href="/">← Back to Tester</a> · <a href="/docs">Docs</a></div>
</div>
<script>
document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
async function doLogin() {
  const btn=document.getElementById('btn'), msg=document.getElementById('msg');
  btn.disabled=true; btn.textContent='Signing in…'; msg.innerHTML='';
  try {
    const r = await fetch('/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value})});
    const d = await r.json();
    if (!d.success) throw new Error(d.error);
    localStorage.setItem('zeroapi_key', d.data.api_key);
    localStorage.setItem('zeroapi_token', d.data.token);
    msg.className='msg ok'; msg.textContent='✓ Signed in successfully!';
    document.getElementById('kv-key').textContent = d.data.api_key;
    document.getElementById('kv-usage').textContent = `${d.data.used||0} / ${d.data.limit||40} requests used today`;
    document.getElementById('form-area').style.display='none';
    document.getElementById('result').style.display='block';
    setTimeout(() => location.href='/', 2000);
  } catch(e) {
    msg.className='msg err'; msg.textContent=e.message;
    btn.disabled=false; btn.textContent='Sign In';
  }
}
function copyEl(id) {
  const t=document.getElementById(id).textContent;
  navigator.clipboard.writeText(t).then(()=>{const el=document.getElementById(id);const orig=el.textContent;el.textContent='✓ Copied!';setTimeout(()=>el.textContent=orig,1400);});
}
</script>
</body>
</html>
